<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { box-sizing: border-box; padding: 28px 32px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 14px; }
  .pane { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 22px; border-radius: var(--r-sm); border: 1px solid var(--ink-line); min-height: 150px; }
  .pane.white { background: var(--pode-white); }
  .pane.ink  { background: var(--pode-ink); border-color: var(--pode-ink); }
  .lbl { font-family: var(--font-display-en); font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); }
  .ink .lbl { color: rgba(255,255,255,0.5); }
  .lockup { display: inline-flex; align-items: center; gap: 12px; }
  .lockup .word { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 38px; letter-spacing: 0.08em; color: var(--pode-ink); }
  .ink .lockup .word { color: var(--pode-white); }
  .mark { width: 56px; height: 56px; display: block; }
  .mark--lg { width: 88px; height: 88px; }
</style>
</head>
<body>
<div class="card">
  <div class="pane white">
    <div class="lockup">
      <img class="mark" src="../assets/logo-mark.svg" alt=""/>
      <span class="word">PODE</span>
    </div>
    <div class="lbl">Wordmark · horizontal</div>
  </div>
  <div class="pane white">
    <img class="mark mark--lg" src="../assets/logo-mark.svg" alt="" />
    <div class="lbl">Mark · orange</div>
  </div>
  <div class="pane white">
    <img class="mark mark--lg" src="../assets/logo-mark-gradient.svg" alt="" />
    <div class="lbl">Mark · Delta Burst</div>
  </div>
  <div class="pane ink">
    <img class="mark mark--lg" src="../assets/logo-mark.svg" alt="" />
    <div class="lbl">Mark · on ink</div>
  </div>
</div>
</body>
</html>

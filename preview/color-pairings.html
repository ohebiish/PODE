<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { box-sizing: border-box; padding: 28px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .pair { display: flex; flex-direction: column; gap: 10px; padding: 18px 22px; border-radius: var(--r-sm); min-height: 110px; }
  .on-white { background: var(--pode-white); border: 1px solid var(--ink-line); }
  .on-ink   { background: var(--pode-ink); }
  .on-orange{ background: var(--pode-orange); }
  .on-burst { background: var(--pode-delta-burst); }
  .lbl { font-family: var(--font-display-en); font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.8; }
  .h { font-family: var(--font-display-en); font-weight: 900; font-size: 26px; line-height: 1.1; letter-spacing: -0.02em; }
  .b { font-size: 13px; line-height: 1.45; }
  .on-white .lbl, .on-white .h { color: var(--pode-ink); }
  .on-white .b { color: var(--ink-2); }
  .on-ink .lbl { color: var(--pode-yellow); }
  .on-ink .h, .on-ink .b { color: var(--pode-white); }
  .on-orange .lbl { color: rgba(255,255,255,0.85); }
  .on-orange .h, .on-orange .b { color: var(--pode-white); }
  .on-burst .lbl { color: var(--pode-white); }
  .on-burst .h, .on-burst .b { color: var(--pode-white); text-shadow: 0 1px 2px rgba(0,0,0,0.15); }
</style>
</head>
<body>
<div class="card">
  <div class="pair on-white">
    <div class="lbl">white / ink</div>
    <div class="h">What is potential.</div>
    <div class="b">Default reading surface.</div>
  </div>
  <div class="pair on-ink">
    <div class="lbl">ink / white</div>
    <div class="h">We move like delta.</div>
    <div class="b">Inverse hero — sections that need weight.</div>
  </div>
  <div class="pair on-orange">
    <div class="lbl">orange / white</div>
    <div class="h">Start a tie-up.</div>
    <div class="b">CTAs and brand-heavy callouts.</div>
  </div>
  <div class="pair on-burst">
    <div class="lbl">delta burst</div>
    <div class="h">Human × AI = Creative.</div>
    <div class="b">The single signature moment.</div>
  </div>
</div>
</body>
</html>

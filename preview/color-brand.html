<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { box-sizing: border-box; padding: 28px 32px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 14px 14px; min-height: 130px; border-radius: var(--r-xs); position: relative; }
  .sw .name { font-family: var(--font-display-en); font-weight: 700; font-size: 13px; letter-spacing: 0.04em; }
  .sw .hex  { font-family: var(--font-display-en); font-weight: 500; font-size: 11px; opacity: 0.7; margin-top: 2px; }
  .sw .meaning { font-family: var(--font-body-jp); font-size: 11px; opacity: 0.65; margin-top: 4px; letter-spacing: 0.04em; }
  .dark { color: var(--pode-ink); }
  .light { color: var(--pode-white); }
  .border { border: 1px solid var(--ink-line); }
  .star { position: absolute; top: 10px; right: 12px; font-size: 11px; font-weight: 800; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="sw border" style="background:#FFFFFF;">
      <div class="name dark">White</div>
      <div class="hex dark">#FFFFFF</div>
      <div class="meaning dark">Canvas / 余白</div>
    </div>
    <div class="sw" style="background:#FF4D1F;">
      <span class="star light">PRIMARY</span>
      <div class="name light">Orange</div>
      <div class="hex light">#FF4D1F</div>
      <div class="meaning light">Human / 人の熱量</div>
    </div>
    <div class="sw" style="background:#534AB7;">
      <div class="name light">Purple</div>
      <div class="hex light">#534AB7</div>
      <div class="meaning light">AI / Claude</div>
    </div>
    <div class="sw" style="background:#FFD60A;">
      <div class="name dark">Yellow</div>
      <div class="hex dark">#FFD60A</div>
      <div class="meaning dark">Creative / 閃き</div>
    </div>
    <div class="sw" style="background:#0A0A0A;">
      <div class="name light">Ink</div>
      <div class="hex light">#0A0A0A</div>
      <div class="meaning light">Text base</div>
    </div>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { box-sizing: border-box; padding: 28px 32px; }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .t { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .swatch { background: var(--ink-1000); width: 16px; border-radius: var(--r-xs); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--ink-700); }
  .val { font-family: var(--font-mono); font-size: 9px; color: var(--ink-500); }
  .grp { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 14px; }
</style>
</head>
<body>
<div class="card">
  <div class="grp">Spacing scale · 4px base</div>
  <div class="row">
    <div class="t"><div class="swatch" style="height:4px"></div><div class="lbl">s-1</div><div class="val">4</div></div>
    <div class="t"><div class="swatch" style="height:8px"></div><div class="lbl">s-2</div><div class="val">8</div></div>
    <div class="t"><div class="swatch" style="height:12px"></div><div class="lbl">s-3</div><div class="val">12</div></div>
    <div class="t"><div class="swatch" style="height:16px"></div><div class="lbl">s-4</div><div class="val">16</div></div>
    <div class="t"><div class="swatch" style="height:20px"></div><div class="lbl">s-5</div><div class="val">20</div></div>
    <div class="t"><div class="swatch" style="height:24px"></div><div class="lbl">s-6</div><div class="val">24</div></div>
    <div class="t"><div class="swatch" style="height:32px"></div><div class="lbl">s-8</div><div class="val">32</div></div>
    <div class="t"><div class="swatch" style="height:40px"></div><div class="lbl">s-10</div><div class="val">40</div></div>
    <div class="t"><div class="swatch" style="height:48px"></div><div class="lbl">s-12</div><div class="val">48</div></div>
    <div class="t"><div class="swatch" style="height:64px"></div><div class="lbl">s-16</div><div class="val">64</div></div>
    <div class="t"><div class="swatch" style="height:80px"></div><div class="lbl">s-20</div><div class="val">80</div></div>
    <div class="t"><div class="swatch" style="height:96px"></div><div class="lbl">s-24</div><div class="val">96</div></div>
    <div class="t"><div class="swatch" style="height:128px"></div><div class="lbl">s-32</div><div class="val">128</div></div>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { box-sizing: border-box; padding: 28px 32px; display: flex; gap: 22px; align-items: stretch; }
  .item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 18px 14px; border-radius: var(--r-sm); border: 1px solid var(--ink-line); background: var(--pode-white); min-height: 160px; }
  .swatch { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
  .swatch img { width: 100%; height: 100%; display: block; }
  .bigD { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 72px; line-height: 1; color: var(--pode-orange); letter-spacing: -0.02em; }
  .name { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px; color: var(--pode-ink); }
  .desc { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--ink-3); text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="item">
    <div class="swatch"><img src="../assets/logo-mark.svg" alt=""></div>
    <div class="name">logo-mark.svg</div>
    <div class="desc">3 deltas / triforce · orange</div>
  </div>
  <div class="item">
    <div class="swatch"><img src="../assets/logo-mark-gradient.svg" alt=""></div>
    <div class="name">logo-mark-gradient.svg</div>
    <div class="desc">3 deltas · Delta Burst</div>
  </div>
  <div class="item">
    <div class="swatch"><div class="bigD">Δ</div></div>
    <div class="name">typeset Δ</div>
    <div class="desc">Unicode · inline use</div>
  </div>
  <div class="item">
    <div class="swatch"><svg viewBox="0 0 64 64"><path d="M32 8 L56 56 L8 56 Z" fill="#FF4D1F"/></svg></div>
    <div class="name">single Δ</div>
    <div class="desc">value-card markers</div>
  </div>
</div>
</body>
</html>

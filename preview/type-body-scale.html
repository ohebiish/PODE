<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { box-sizing: border-box; padding: 28px 32px; }
  .row { display: grid; grid-template-columns: 120px 1fr; gap: 14px 24px; align-items: baseline; }
  .meta { font-family: var(--font-display-en); font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); padding-top: 8px; }
  .spec { color: var(--fg); font-family: 'Inter', sans-serif; }
  .h2 { font-weight: 800; font-size: 36px; line-height: 1.05; letter-spacing: -0.025em; }
  .h3 { font-weight: 700; font-size: 24px; line-height: 1.2; letter-spacing: -0.015em; }
  .h4 { font-weight: 700; font-size: 18px; line-height: 1.3; }
  .body-lg { font-weight: 400; font-size: 18px; line-height: 1.6; color: var(--ink-2); }
  .body    { font-weight: 400; font-size: 16px; line-height: 1.7; color: var(--ink-2); }
  .small   { font-weight: 400; font-size: 14px; line-height: 1.5; color: var(--ink-2); }
  .eyebrow { font-weight: 700; font-size: 11px; letter-spacing: 0.20em; text-transform: uppercase; color: var(--pode-orange); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="meta">Eyebrow</div>
    <div class="spec eyebrow">03 · VALUES</div>

    <div class="meta">H2 · Inter 800</div>
    <div class="spec h2">Companion, not contractor.</div>

    <div class="meta">H3 · 700</div>
    <div class="spec h3">Sit down. Ask.</div>

    <div class="meta">H4 · 700</div>
    <div class="spec h4">変化量で語る</div>

    <div class="meta">Body LG · 18</div>
    <div class="spec body-lg">Short, declarative sentences with room to breathe.</div>

    <div class="meta">Body · 16</div>
    <div class="spec body">The default reading size. Inter regular over white at 1.7 line-height.</div>

    <div class="meta">Small · 14</div>
    <div class="spec small">Metadata, captions, footnotes.</div>
  </div>
</div>
</body>
</html>

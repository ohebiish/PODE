<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { box-sizing: border-box; padding: 28px 32px; display: grid; grid-template-columns: repeat(8, 1fr); gap: 18px 14px; align-items: center; justify-items: center; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ic svg { width: 24px; height: 24px; stroke: var(--ink-1000); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  .nm { font-family: var(--font-mono); font-size: 9px; color: var(--ink-500); letter-spacing: 0.04em; }
  .grp { grid-column: 1 / -1; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-3); }
</style>
</head>
<body>
<div class="card">
  <div class="grp">Lucide · 1.5 stroke · rounded caps</div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg><div class="nm">arrow-right</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><div class="nm">plus</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><div class="nm">search</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg><div class="nm">menu</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg><div class="nm">close</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg><div class="nm">chevron-down</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg><div class="nm">check</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><div class="nm">message</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><div class="nm">clock</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 2 2 22h20z"/></svg><div class="nm">delta ★ brand</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg><div class="nm">layout</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M19 21 12 16l-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><div class="nm">bookmark</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg><div class="nm">document</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M2 12h20M12 2a14 14 0 0 1 0 20 14 14 0 0 1 0-20"/></svg><div class="nm">globe</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><div class="nm">user</div></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="m12 2 3 7 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/></svg><div class="nm">star</div></div>
</div>
</body>
</html>

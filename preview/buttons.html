<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { box-sizing: border-box; padding: 28px 32px; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .lbl { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.20em; text-transform: uppercase; color: var(--ink-3); min-width: 100px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px;
    padding: 10px 20px;
    border-radius: 999px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 200ms cubic-bezier(0.7,0,0.15,1), color 200ms;
  }
  .btn.primary { background: #FF4D1F; color: white; }
  .btn.primary:hover { background: #E64418; box-shadow: 0 8px 24px -8px rgba(255,77,31,0.45); }
  .btn.ink { background: #0A0A0A; color: white; }
  .btn.ink:hover { background: #2B2825; }
  .btn.outline { background: transparent; color: #0A0A0A; border-color: rgba(10,10,10,0.18); }
  .btn.outline:hover { background: rgba(10,10,10,0.04); border-color: rgba(10,10,10,0.5); }
  .btn.ghost { background: transparent; color: #0A0A0A; }
  .btn.ghost:hover { color: #FF4D1F; }
  .delta { display: inline-block; width: 9px; height: 9px; background: currentColor; clip-path: polygon(50% 0, 100% 100%, 0 100%); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="lbl">Primary</div>
    <button class="btn primary">Start a tie-up <span class="delta"></span></button>
    <button class="btn primary">Talk to us →</button>
  </div>
  <div class="row">
    <div class="lbl">Ink</div>
    <button class="btn ink">Read the brief</button>
    <button class="btn ink">hello@pode.jp →</button>
  </div>
  <div class="row">
    <div class="lbl">Outline</div>
    <button class="btn outline">Learn more</button>
    <button class="btn outline">Cancel</button>
  </div>
  <div class="row">
    <div class="lbl">Ghost</div>
    <button class="btn ghost">Skip</button>
    <button class="btn ghost">View all →</button>
  </div>
</div>
</body>
</html>

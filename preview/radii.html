<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { box-sizing: border-box; padding: 32px 36px; display: flex; gap: 28px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 88px; height: 88px; background: var(--paper-pure); border: 1px solid var(--border-soft); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--ink-700); }
  .val { font-family: var(--font-mono); font-size: 9px; color: var(--ink-500); }
</style>
</head>
<body>
<div class="card">
  <div class="item"><div class="box" style="border-radius:0"></div><div class="lbl">r-0</div><div class="val">0 · editorial</div></div>
  <div class="item"><div class="box" style="border-radius:2px"></div><div class="lbl">r-xs</div><div class="val">2 · inputs</div></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">r-sm</div><div class="val">4 · cards ★</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">r-md</div><div class="val">8 · overlays</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">r-lg</div><div class="val">12 · modals</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">r-pill</div><div class="val">chips, tags</div></div>
</div>
</body>
</html>
